_format_version: "3.0"
_transform: true

services:
  - name: identity-service
    host: identity-service-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    tags:
      - internal
      - identity

  - name: patients-service
    host: patients-service-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    tags:
      - healthsync
      - patients

  - name: doctors-service
    host: doctors-service-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    tags:
      - healthsync
      - doctors

  - name: appointments-service
    host: appointments-service-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    tags:
      - healthsync
      - appointments

  - name: notifications-service
    host: notifications-service-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    tags:
      - healthsync
      - notifications

routes:
  - name: identity-api
    service:
      name: identity-service
    paths:
      - /api/v1/identity
    methods:
      - POST
      - GET
    strip_path: false

  - name: patients-api
    service:
      name: patients-service
    paths:
      - /api/v1/patients
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
    strip_path: false

  - name: doctors-api
    service:
      name: doctors-service
    paths:
      - /api/v1/doctors
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
    strip_path: false

  - name: appointments-api
    service:
      name: appointments-service
    paths:
      - /api/v1/appointments
    methods:
      - GET
      - POST
      - PUT
      - DELETE
    strip_path: false

  - name: partner-api
    service:
      name: patients-service
    paths:
      - /api/v1/partners
    methods:
      - GET
      - POST
    strip_path: false

upstreams:
  - name: identity-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 3
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
    targets:
      - target: identity-service-1:8080
        weight: 100
      - target: identity-service-2:8080
        weight: 100

  - name: patients-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 3
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
    targets:
      - target: patients-service-1:8080
        weight: 100
      - target: patients-service-2:8080
        weight: 100

  - name: doctors-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 3
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
    targets:
      - target: doctors-service-1:8080
        weight: 100
      - target: doctors-service-2:8080
        weight: 100

  - name: appointments-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /health
        timeout: 3
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
          tcp_failures: 3
          timeouts: 3
    targets:
      - target: appointments-service-1:8080
        weight: 100
      - target: appointments-service-2:8080
        weight: 100

plugins:
  # Global Correlation ID
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

  # Global CORS
  - name: cors
    config:
      origins:
        - https://healthsync.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      credentials: true
      max_age: 3600

  - name: jwt
    service: patients-service
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: iss
      header_names:
        - Authorization
      maximum_expiration: 86400

  - name: jwt
    service: doctors-service
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: iss
      header_names:
        - Authorization
      maximum_expiration: 86400

  - name: jwt
    service: appointments-service
    config:
      uri_param_names: []
      cookie_names: []
      key_claim_name: iss
      header_names:
        - Authorization
      maximum_expiration: 86400

  - name: key-auth
    route: partner-api
    config:
      key_names:
        - X-API-Key
      hide_credentials: true

  - name: rate-limiting
    service: identity-service
    config:
      minute: 30
      policy: local

  - name: prometheus
    config:
      per_consumer: false
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
